<!DOCTYPE html>
<html>
<head>
    <title>AI Code Reviewer</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>AI Code Reviewer</h1>

    <form method="POST">

        <textarea
            name="code"
            placeholder="Paste your code here..."
            required>{{ code }}</textarea>

        <button type="submit">
            Review Code
        </button>

    </form>

    {% if suggestions %}

    <div class="result">

        <h2>Suggestions</h2>

        <ul>

            {% for suggestion in suggestions %}

            <li>{{ suggestion }}</li>

            {% endfor %}

        </ul>

    </div>

    {% endif %}

</div>

</body>
</html>
